<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" type="image/png" href="src/image.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - O que eu assisti</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: rgba(30, 33, 40, 0.85);
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --text-color: #f8fafc;
            --input-bg: #1a1d23;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Mesma imagem de fundo para manter a identidade */
            background: linear-gradient(rgba(15, 17, 21, 0.85), rgba(15, 17, 21, 0.85)), 
                        url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            padding: 20px;
        }

        .register-container {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .register-container h2 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .register-container p.subtitle {
            color: #94a3b8;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 18px;
            flex: 1;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: #cbd5e1;
        }

        .form-group input {
            width: 100%;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: var(--input-bg);
            color: white;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .terms {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            font-size: 0.8rem;
            color: #94a3b8;
            text-align: left;
        }

        .terms input {
            cursor: pointer;
        }

        .btn-register {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-register:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3);
        }

        .extra-links {
            margin-top: 25px;
            font-size: 0.85rem;
        }

        .extra-links a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }

        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .back-home:hover {
            opacity: 1;
        }

        /* Ajuste para telas pequenas */
        @media (max-width: 480px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-home">← Voltar</a>

    <div class="register-container">
        <h2>Criar sua conta</h2>
        <p class="subtitle">Comece a catalogar sua jornada cinéfila.</p>

        <form id="loginForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Nome</label>
                    <input type="text" id="name" placeholder="Seu nome" required>
                </div>
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" placeholder="@cinefilo" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirmar</label>
                    <input type="password" id="confirm-password" placeholder="••••••••" required>
                </div>
            </div>

            <div class="terms">
                <input type="checkbox" id="terms" required>
                <label for="terms">Eu concordo com os Termos de Uso e Privacidade.</label>
            </div>

            <button type="submit" class="btn-register">Criar minha conta</button>
        </form>

        <div class="extra-links">
            <p>Já faz parte do clube? <a href="login.html">Faça login</a></p>
        </div>
    </div>

    <script>
        window.history.pushState({}, "", "/register");
        function register(event) {

    event.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const username = document.getElementById("username").value;
    const name = document.getElementById("name").value;

    fetch('/api/register', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email, password, username, name })
    })
    
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert('Conta criada com sucesso! Faça login para começar a usar.');
            window.location.href = '/login';
        } else {
            alert('Erro ao criar conta: ' + data.message);
        }
    })
    .catch(error => {
        console.error('Erro ao criar conta:', error);
        alert('Desculpe, ocorreu um erro ao tentar criar sua conta. Por favor, tente novamente mais tarde.');
    });
        }

        document.getElementById("loginForm").addEventListener("submit", register);
    </script>
</body>
</html>
